<div class="grid-2">
<div>
<blockquote>
<p><em>&quot;Legacy software is code that <strong>you are afraid to change</strong> because you no longer fully understand its side effects.&quot;</em><br />
<cite>— Michael Feathers (2004)</cite></p>
</blockquote>
<br />
<p>El <a href="https://www.gov.uk/guidance/managing-legacy-technology">UK Government</a> define <strong>5 criterios</strong>. Basta con cumplir <strong>uno</strong>:</p>
</div>
<div>
<div class="card"><strong>1. End-of-life</strong> del producto</div>
<div class="card"><strong>2. Sin soporte</strong> del proveedor</div>
<div class="card"><strong>3. Imposible de actualizar</strong></div>
<div class="card"><strong>4. Mala relación costo-beneficio</strong></div>
<div class="card"><strong>5. Por encima del riesgo aceptable</strong></div>
</div>
</div>
<div class="accent">
"Legacy" <strong>no</strong> es sinónimo de "viejo". Es una posición frente al riesgo y al costo.
</div>
<div class="source-link">
<a href="https://www.gov.uk/guidance/managing-legacy-technology">UK Government · Managing Legacy Technology (CDDO, 2024)</a> · Michael Feathers, <em>Working Effectively with Legacy Code</em> (2004)
</div>

<div>
<div class="case-meta">Framework · UK Government · CDDO 2024</div>
<table>
<thead>
<tr>

<th>Qué significa</th>
<th>Riesgo</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Retain</strong></td>
<td>Mantener con monitoreo activo.</td>
<td><span class="pill pill-amber">Crece con el tiempo</span></td>
</tr>
<tr>
<td><strong>Retire</strong></td>
<td>Apagar lo que ya no se usa.</td>
<td><span class="pill pill-green">Bajo · alto valor</span></td>
</tr>
<tr>
<td><strong>Re-host</strong></td>
<td>Mover sin cambios (lift &amp; shift).</td>
<td><span class="pill pill-green">Bajo</span></td>
</tr>
<tr>
<td><strong>Repurchase</strong></td>
<td>Reemplazar con SaaS o producto.</td>
<td><span class="pill pill-amber">Medio</span></td>
</tr>
<tr>
<td><strong>Re-platform</strong></td>
<td>Mover con cambios menores de arq.</td>
<td><span class="pill pill-amber">Medio</span></td>
</tr>
</tbody>
</table>
<div class="key-danger">
<strong>Rebuild no está en la lista.</strong> Reescribir desde cero es Plan B — el más riesgoso.
</div>
</div>
<div>
<div class="case-meta">Cómo se combinan en Plan C</div>
<div class="card">
<strong>Fase 1 · Entender</strong><br />

</div>
<div class="card">

</div>
<div class="card">
<strong>Fase 3 · Evolucionar</strong><br />
<em>Re-platform</em> incremental. Cada ciclo entrega valor medible al negocio.
</div>
<div class="accent">

</div>
</div>

<h1 id="anti-corruption-layer--acl">Anti-Corruption Layer · ACL</h1>
<div class="grid-2">
<div>
<h3 id="el-problema">El problema</h3>
<p>Cuando migrás un sistema legacy a uno nuevo, los dos mundos hablan idiomas distintos:</p>
<ul>
<li>Nombres de campos diferentes</li>
<li>Convenciones de datos incompatibles</li>
<li>Semántica distinta para el mismo concepto</li>
</ul>
<p>Si los sistemas se conectan directamente, el modelo nuevo se <strong>contamina</strong> con las estructuras del viejo — y viceversa.</p>
<h3 id="la-soluci%C3%B3n">La solución</h3>
<p>El ACL es una <strong>capa de traducción</strong> que se sienta entre los dos sistemas y convierte los datos de un modelo al otro sin que ninguno de los dos se contamine con las estructuras del otro.</p>
</div>
<div>
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  Sistema LEGACY          Sistema NUEVO
  ┌─────────────┐        ┌─────────────┐
  │ campo_id    │        │ customerId  │
  │ fec_nac     │◄──────►│ birthDate   │
  │ imp_tot     │  ACL   │ totalAmount │
  │ cod_suc     │        │ branchCode  │
  └─────────────┘        └─────────────┘
</code></pre>
</div>
<div class="card">
<strong>Cada sistema evoluciona de forma independiente.</strong> El ACL absorbe los cambios de uno sin que el otro lo note.
</div>
<div class="key-danger">
Sin ACL, un campo renombrado en el sistema viejo puede corromper registros en el nuevo. Eso es exactamente lo que ocurrió en TSB.
</div>
</div>
</div>
<div class="source-link">
Eric Evans · <em>Domain-Driven Design</em> (2003) · Patrón: Anti-Corruption Layer
</div>

<h1 id="devops-y-observabilidad--el-puente-al-legacy">DevOps y observabilidad · el puente al legacy</h1>
<div class="grid-2">
<div>
<h3 id="por-qu%C3%A9-importa">Por qué importa</h3>
<p>Plan C requiere <strong>ciclos cortos, reversibles, medibles</strong>:</p>
<ul>
<li><strong>CI/CD</strong> → habilita Smart Mirroring</li>
<li><strong>Infrastructure as Code</strong> → reproducir entornos</li>
<li><strong>Observability (OTel)</strong> → iluminar la caja negra</li>
<li><strong>GitOps</strong> → auditar cada cambio</li>
<li><strong>DORA metrics</strong> → medir progreso real</li>
</ul>
</div>
<div>
<h3 id="tres-reglas-operativas">Tres reglas operativas</h3>
<div class="card"><strong>1. Si no se mide, no se moderniza.</strong><br /><span>Telemetría primero, refactor después.</span></div>
<div class="card"><strong>2. Si no se automatiza, no se repite.</strong><br /><span>Migración manual = irrepetible.</span></div>
<div class="card"><strong>3. Si no se versiona, no se audita.</strong><br /><span>GitOps no es opcional en sistemas regulados.</span></div>
</div>
</div>
<div class="key">
DevOps no es <em>tooling</em>. Es la <strong>cultura</strong> que hace posible Plan C.
</div>
